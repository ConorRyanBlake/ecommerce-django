{% extends 'store/base.html' %}

{% block title %}Register - eCommerce{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Create an Account</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
                <small class="text-muted">At least 8 characters.</small>
            </div>

            <div class="mb-3">
                <label for="password_conf" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="password_conf" name="password_conf" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Account Type</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="role_buyer" value="buyer" checked>
                    <label class="form-check-label" for="role_buyer">
                        <strong>Buyer</strong> - browse and buy products
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="role_vendor" value="vendor">
                    <label class="form-check-label" for="role_vendor">
                        <strong>Vendor</strong> - sell products in your own store
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
            <a href="{% url 'store:login' %}" class="btn btn-link">Already have an account?</a>
        </form>
    </div>
</div>
{% endblock %}
