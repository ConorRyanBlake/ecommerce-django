{% extends 'store/base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>Reset Your Password</h2>
        <p class="text-muted">Enter a new password for your account.</p>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="password" name="password" required autofocus>
                <small class="text-muted">At least 8 characters.</small>
            </div>

            <div class="mb-3">
                <label for="password_conf" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="password_conf" name="password_conf" required>
            </div>

            <button type="submit" class="btn btn-primary">Update Password</button>
            <a href="{% url 'store:login' %}" class="btn btn-link">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
